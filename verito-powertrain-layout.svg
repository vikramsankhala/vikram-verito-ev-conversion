<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 480" width="100%" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arr1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="#00c9ff" stroke-width="1.5"/>
          </marker>
          <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="#4ade80" stroke-width="1.5"/>
          </marker>
          <marker id="arr3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
          </marker>
          <marker id="arr4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="#f43f5e" stroke-width="1.5"/>
          </marker>
          <marker id="arr5" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="#84cc16" stroke-width="1.5"/>
          </marker>
          <marker id="arr6" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
          </marker>
        </defs>

        <!-- === ROW 1: AC INPUT SIDE === -->
        <!-- AC Mains -->
        <rect x="20" y="30" width="110" height="56" rx="8" fill="#0d1e08" stroke="#84cc16" stroke-width="1.5"/>
        <text x="75" y="52" fill="#84cc16" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle" font-weight="600">AC MAINS</text>
        <text x="75" y="65" fill="#4a7a20" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">230V / 16A</text>
        <text x="75" y="77" fill="#4a7a20" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">Grid Supply</text>

        <!-- Diesel Generator -->
        <rect x="20" y="110" width="110" height="56" rx="8" fill="#2a1505" stroke="#f59e0b" stroke-width="1.5"/>
        <text x="75" y="132" fill="#f59e0b" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle" font-weight="600">DIESEL GEN</text>
        <text x="75" y="145" fill="#c47a05" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">230V / 3–5kVA</text>
        <text x="75" y="157" fill="#c47a05" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">Stationary Mode</text>

        <!-- Fuel Tank -->
        <rect x="20" y="190" width="110" height="40" rx="8" fill="#1a2505" stroke="#84cc16" stroke-width="1"/>
        <text x="75" y="208" fill="#84cc16" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle">FUEL TANK</text>
        <text x="75" y="222" fill="#4a7a20" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">50L (Retained)</text>

        <!-- === CHANGEOVER SWITCH === -->
        <rect x="170" y="60" width="110" height="75" rx="8" fill="#0d1830" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="225" y="85" fill="#a78bfa" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle" font-weight="600">CHANGEOVER</text>
        <text x="225" y="98" fill="#a78bfa" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle" font-weight="600">SWITCH</text>
        <text x="225" y="113" fill="#6a5ab0" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">Grid / Gen</text>
        <text x="225" y="124" fill="#6a5ab0" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">Manual Select</text>

        <!-- === ONBOARD CHARGER === -->
        <rect x="330" y="50" width="120" height="90" rx="8" fill="#051525" stroke="#00c9ff" stroke-width="2"/>
        <text x="390" y="75" fill="#00c9ff" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle" font-weight="600">ONBOARD</text>
        <text x="390" y="88" fill="#00c9ff" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle" font-weight="600">CHARGER (OBC)</text>
        <text x="390" y="101" fill="#0080b0" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">AC → DC</text>
        <text x="390" y="113" fill="#0080b0" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">3.3 kW / 72V</text>
        <text x="390" y="125" fill="#0080b0" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">SAE J1772 / Type 2</text>

        <!-- === MAIN FUSE + CONTACTOR === -->
        <rect x="500" y="60" width="100" height="70" rx="8" fill="#0d1830" stroke="#f43f5e" stroke-width="1.5"/>
        <text x="550" y="83" fill="#f43f5e" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle" font-weight="600">MAIN FUSE</text>
        <text x="550" y="96" fill="#f43f5e" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle" font-weight="600">+CONTACTOR</text>
        <text x="550" y="109" fill="#9a2030" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">400A Fuse</text>
        <text x="550" y="120" fill="#9a2030" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">KILOVAC EV200</text>

        <!-- === BATTERY PACK CENTER === -->
        <rect x="340" y="200" width="220" height="90" rx="10" fill="#051525" stroke="#00c9ff" stroke-width="2.5"/>
        <text x="450" y="228" fill="#00c9ff" font-family="'JetBrains Mono',monospace" font-size="11" text-anchor="middle" font-weight="600">BATTERY PACK</text>
        <text x="450" y="246" fill="#0080b0" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle">72V / 200Ah LiFePO4</text>
        <text x="450" y="260" fill="#0080b0" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle">~14.4 kWh usable</text>
        <text x="450" y="274" fill="#0080b0" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle">Cells in 24S8P config</text>
        <text x="450" y="283" fill="#004060" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">Under-floor + firewall-side mounting</text>

        <!-- === BMS === -->
        <rect x="620" y="190" width="100" height="70" rx="8" fill="#1a1000" stroke="#f59e0b" stroke-width="1.5"/>
        <text x="670" y="213" fill="#f59e0b" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle" font-weight="600">BMS</text>
        <text x="670" y="226" fill="#f59e0b" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle" font-weight="600">Smart BMS</text>
        <text x="670" y="239" fill="#c47a05" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">DALY / JK / ANT</text>
        <text x="670" y="250" fill="#c47a05" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">Cell balancing</text>
        <text x="670" y="261" fill="#c47a05" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">Over/under prot.</text>

        <!-- === MOTOR CONTROLLER === -->
        <rect x="330" y="350" width="130" height="80" rx="8" fill="#0d1830" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="395" y="376" fill="#a78bfa" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle" font-weight="600">MOTOR</text>
        <text x="395" y="389" fill="#a78bfa" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle" font-weight="600">CONTROLLER</text>
        <text x="395" y="403" fill="#6a50b0" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">SEVCON / Kelly</text>
        <text x="395" y="415" fill="#6a50b0" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">72V 500A</text>
        <text x="395" y="426" fill="#6a50b0" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">Regen braking</text>

        <!-- === AC MOTOR === -->
        <rect x="150" y="360" width="120" height="70" rx="8" fill="#071808" stroke="#4ade80" stroke-width="2"/>
        <text x="210" y="386" fill="#4ade80" font-family="'JetBrains Mono',monospace" font-size="10" text-anchor="middle" font-weight="600">AC MOTOR</text>
        <text x="210" y="400" fill="#2a8040" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle">72V 3-Phase</text>
        <text x="210" y="413" fill="#2a8040" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle">30 kW / 91 Nm</text>
        <text x="210" y="424" fill="#2a8040" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">Induction Motor</text>

        <!-- === DC-DC CONVERTER === -->
        <rect x="500" y="350" width="110" height="70" rx="8" fill="#0d1830" stroke="#2dd4bf" stroke-width="1.5"/>
        <text x="555" y="375" fill="#2dd4bf" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle" font-weight="600">DC-DC CONV</text>
        <text x="555" y="390" fill="#1a9080" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">72V → 12V</text>
        <text x="555" y="403" fill="#1a9080" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">30A / 360W</text>
        <text x="555" y="417" fill="#1a9080" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">Accessories bus</text>

        <!-- === 12V BATTERY === -->
        <rect x="660" y="350" width="100" height="60" rx="8" fill="#1a0505" stroke="#f43f5e" stroke-width="1.5"/>
        <text x="710" y="373" fill="#f43f5e" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle" font-weight="600">12V AUX</text>
        <text x="710" y="386" fill="#f43f5e" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle" font-weight="600">BATTERY</text>
        <text x="710" y="399" fill="#9a2030" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">35Ah AGM</text>
        <text x="710" y="409" fill="#9a2030" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">Lights, ECU, AC</text>

        <!-- === ARROWS / CONNECTIONS === -->
        <!-- AC Mains → Changeover -->
        <path d="M130,58 L168,90" stroke="#84cc16" stroke-width="1.5" fill="none" marker-end="url(#arr5)"/>
        <!-- Diesel Gen → Changeover -->
        <path d="M130,138 L168,110" stroke="#84cc16" stroke-width="1.5" fill="none" marker-end="url(#arr5)"/>
        <!-- Fuel → Generator (fuel line) -->
        <path d="M130,210 L175,170" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 3" fill="none" opacity="0.5"/>

        <!-- Changeover → OBC -->
        <path d="M280,95 L328,95" stroke="#84cc16" stroke-width="1.5" fill="none" marker-end="url(#arr5)"/>

        <!-- OBC → Main Fuse -->
        <path d="M450,95 L498,95" stroke="#00c9ff" stroke-width="2" fill="none" marker-end="url(#arr1)"/>

        <!-- Main Fuse → Battery -->
        <path d="M550,130 L530,200" stroke="#00c9ff" stroke-width="2" fill="none" marker-end="url(#arr1)"/>

        <!-- Battery → Motor Controller -->
        <path d="M430,290 L415,348" stroke="#00c9ff" stroke-width="2" fill="none" marker-end="url(#arr1)"/>

        <!-- Battery → DC-DC -->
        <path d="M470,290 L520,348" stroke="#00c9ff" stroke-width="1.5" fill="none" marker-end="url(#arr1)"/>

        <!-- Battery → BMS (signal) -->
        <path d="M560,245 L618,230" stroke="#f59e0b" stroke-width="1.5" fill="none" marker-end="url(#arr3)"/>

        <!-- BMS → Motor Controller (CAN) -->
        <path d="M650,260 L430,360" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4 3" fill="none" marker-end="url(#arr6)" opacity="0.7"/>

        <!-- Motor Controller → Motor -->
        <path d="M330,390 L272,390" stroke="#4ade80" stroke-width="2" fill="none" marker-end="url(#arr2)"/>

        <!-- DC-DC → 12V Battery -->
        <path d="M610,385 L658,385" stroke="#f43f5e" stroke-width="1.5" fill="none" marker-end="url(#arr4)"/>

        <!-- Regen: Motor → Controller (back) -->
        <path d="M210,360 L210,340 L395,340 L395,348" stroke="#4ade80" stroke-width="1" stroke-dasharray="3 3" fill="none" marker-end="url(#arr2)" opacity="0.5"/>

        <!-- Labels -->
        <text x="300" y="82" fill="#84cc16" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">230V AC</text>
        <text x="474" y="88" fill="#00c9ff" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">72V DC</text>
        <text x="475" y="320" fill="#00c9ff" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">72V</text>
        <text x="302" y="320" fill="#00c9ff" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">72V HV</text>
        <text x="297" y="392" fill="#4ade80" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">3-Phase AC</text>
        <text x="634" y="380" fill="#f43f5e" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">12V DC</text>
        <text x="540" y="335" fill="#a78bfa" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">CAN Bus</text>
        <text x="230" y="352" fill="#4ade80" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle" opacity="0.5">← REGEN</text>

        <!-- Legend at bottom -->
        <text x="20" y="465" fill="#3a5a7a" font-family="'JetBrains Mono',monospace" font-size="8">HIGH-VOLTAGE POWER FLOW &amp; CONTROL WIRING SCHEMATIC — MAHINDRA VERITO EV CONVERSION</text>
      </svg>