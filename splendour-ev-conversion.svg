<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 520 320" width="100%" xmlns="http://www.w3.org/2000/svg">
          <!-- Ground Track -->
          <line x1="20" y1="280" x2="500" y2="280" stroke="#1e3a5a" stroke-width="2"/>
          
          <!-- Motorcycle Silhouette (Matt Black Theme) -->
          <!-- Wheels -->
          <circle cx="120" cy="230" r="45" fill="none" stroke="#222" stroke-width="6"/> <!-- Rear Tire -->
          <circle cx="120" cy="230" r="35" fill="none" stroke="#666" stroke-width="1.5"/> <!-- Rim -->
          <line x1="85" y1="230" x2="155" y2="230" stroke="#555" stroke-width="1"/>
          <line x1="120" y1="195" x2="120" y2="265" stroke="#555" stroke-width="1"/>
          <circle cx="120" cy="230" r="6" fill="#222"/> <!-- Hub -->

          <circle cx="380" cy="230" r="45" fill="none" stroke="#222" stroke-width="6"/> <!-- Front Tire -->
          <circle cx="380" cy="230" r="35" fill="none" stroke="#666" stroke-width="1.5"/> <!-- Rim -->
          <line x1="345" y1="230" x2="415" y2="230" stroke="#555" stroke-width="1"/>
          <line x1="380" y1="195" x2="380" y2="265" stroke="#555" stroke-width="1"/>
          <circle cx="380" cy="230" r="6" fill="#222"/> <!-- Hub -->

          <!-- Front Fork & Handlebar -->
          <line x1="380" y1="230" x2="320" y2="100" stroke="#111" stroke-width="8"/> <!-- Fork -->
          <line x1="320" y1="100" x2="340" y2="80" stroke="#222" stroke-width="4"/> <!-- Handle -->
          <rect x="340" y="76" width="15" height="8" rx="2" fill="#111"/> <!-- Grip -->

          <!-- Chassis / Frame Core -->
          <path d="M120 230 L160 170 L280 170 L320 100" stroke="#222" stroke-width="6" fill="none"/>
          <path d="M280 170 L300 230 L160 230 Z" fill="#1a1a1a" stroke="#222" stroke-width="4"/>

          <!-- Body Panels -->
          <!-- Fuel Tank (Matt Black) -->
          <path d="M250 120 Q290 100 320 110 L300 160 Q260 160 250 140 Z" fill="#262626" stroke="#444" stroke-width="1"/>
          <text x="285" y="135" fill="#444" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle" font-weight="bold">HERO</text>

          <!-- Seat (Gel/Saddlemen) -->
          <path d="M150 120 Q200 120 250 120 L250 140 L160 150 Z" fill="#111" stroke="#333" stroke-width="1.5"/>
          <path d="M155 125 L245 125" stroke="#333" stroke-width="1" stroke-dasharray="2,2"/> <!-- Stitching detail -->

          <!-- 100cc Engine Block -->
          <rect x="230" y="180" width="50" height="40" rx="4" fill="#333" stroke="#555" stroke-width="2"/>
          <rect x="235" y="180" width="40" height="5" fill="#777"/> <!-- Cylinder fins -->
          <rect x="235" y="190" width="40" height="5" fill="#777"/>
          <rect x="235" y="200" width="40" height="5" fill="#777"/>
          <!-- Engine annotation -->
          <text x="255" y="172" fill="#7a9bbf" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">100cc OHC</text>
          
          <!-- Exhaust Pipe -->
          <path d="M260 215 L260 240 L120 230" fill="none" stroke="#222" stroke-width="8" stroke-linecap="round"/>
          <path d="M260 215 L260 240 L120 230" fill="none" stroke="#444" stroke-width="4" stroke-linecap="round"/>

          <!-- Headlight (LED) -->
          <rect x="330" y="95" width="20" height="25" rx="5" fill="#111"/>
          <polygon points="350,100 390,80 390,120 350,115" fill="rgba(45,212,191,0.2)"/> <!-- Light beam diff -->
          <line x1="345" y1="105" x2="345" y2="110" stroke="#2dd4bf" stroke-width="4"/> <!-- LED diode -->

          <!-- Rear shocks & tail logic -->
          <line x1="120" y1="230" x2="155" y2="145" stroke="#666" stroke-width="5"/> <!-- Dual shock -->
          <line x1="115" y1="210" x2="160" y2="155" stroke="#333" stroke-width="2"/> <!-- Spring detail -->
          <line x1="113" y1="200" x2="158" y2="145" stroke="#333" stroke-width="2"/>

          <!-- CALLOUTS & ACCESSORIES -->
          <!-- Paint Check -->
          <polyline points="290,120 310,60 330,60" fill="none" stroke="#7a9bbf" stroke-width="1"/>
          <text x="365" y="63" fill="#7a9bbf" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">MATT BLACK PAINT WORK</text>

          <!-- USB Charger -->
          <circle cx="310" cy="100" r="4" fill="#00c9ff"/>
          <polyline points="310,100 290,85 270,85" fill="none" stroke="#00c9ff" stroke-width="1"/>
          <text x="240" y="88" fill="#00c9ff" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">USB FAST CHARGER</text>

          <!-- Headlight -->
          <polyline points="340,125 360,150 380,150" fill="none" stroke="#2dd4bf" stroke-width="1"/>
          <text x="415" y="153" fill="#2dd4bf" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">LED HEADLIGHT</text>

          <!-- Custom Seat -->
          <polyline points="210,120 210,100 180,100" fill="none" stroke="#f59e0b" stroke-width="1"/>
          <text x="145" y="103" fill="#f59e0b" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">GEL CUSHION SEAT</text>

          <!-- Bungee Net / Cargo -->
          <path d="M125 125 L160 120 L160 135 L125 135 Z" fill="none" stroke="#f43f5e" stroke-width="1" stroke-dasharray="2,2"/>
          <polyline points="140,125 120,90 100,90" fill="none" stroke="#f43f5e" stroke-width="1"/>
          <text x="70" y="93" fill="#f43f5e" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">BUNGEE CARGO NET</text>

          <text x="260" y="305" fill="#3a5a7a" font-family="'Space Grotesk',sans-serif" font-size="10" text-anchor="middle" letter-spacing="2">HERO HONDA SPLENDOUR 100cc — SERVICE & MOD LAYOUT</text>
        </svg>