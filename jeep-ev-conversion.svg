<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 520 320" width="100%" xmlns="http://www.w3.org/2000/svg">
          <!-- Ground Track -->
          <line x1="20" y1="280" x2="500" y2="280" stroke="#1e3a5a" stroke-width="2"/>
          <path d="M40 280 L60 270 L80 280 L100 275" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.6"/> <!-- Rock trail -->

          <!-- Jeep Body (Firecracker Red) -->
          <!-- Rear body, door, front hood, grille -->
          <path d="M70,180 L70,110 L140,110 L160,70 L260,70 L280,110 L390,110 L390,140 L410,140 L420,170 L420,200 L70,200 Z" fill="#ef4444" stroke="#991b1b" stroke-width="1.5"/>
          
          <!-- Wheel arches / Fenders (Black) -->
          <path d="M80,200 A35,35 0 0,1 160,200 Z" fill="#111" stroke="#333" stroke-width="2"/>
          <path d="M330,200 A35,35 0 0,1 410,200 Z" fill="#111" stroke="#333" stroke-width="2"/>
          
          <!-- Roof / Roll Cage (Black) -->
          <rect x="140" y="60" width="140" height="10" rx="3" fill="#111"/>
          <line x1="150" y1="70" x2="140" y2="110" stroke="#111" stroke-width="5"/>
          <line x1="210" y1="70" x2="210" y2="110" stroke="#111" stroke-width="5"/>
          <line x1="270" y1="70" x2="280" y2="110" stroke="#111" stroke-width="5"/>

          <!-- Windows -->
          <polygon points="152,72 205,72 205,108 142,108" fill="#0a2040" opacity="0.8"/>
          <polygon points="215,72 268,72 278,108 215,108" fill="#0a2040" opacity="0.8"/>
          
          <!-- Front Grille & Headlight -->
          <rect x="415" y="145" width="5" height="20" fill="#facc15"/>
          <line x1="410" y1="145" x2="410" y2="165" stroke="#777" stroke-width="2"/>
          
          <!-- Winch -->
          <rect x="420" y="185" width="15" height="10" rx="2" fill="#333"/>
          <circle cx="425" cy="190" r="3" fill="#666"/>
          
          <!-- Wheels & 37" Rock Crawler Tires -->
          <circle cx="120" cy="235" r="42" fill="#111" stroke="#333" stroke-width="4" stroke-dasharray="6,4"/>
          <circle cx="120" cy="235" r="22" fill="#444" stroke="#222" stroke-width="2"/>
          <circle cx="120" cy="235" r="5" fill="#111"/>

          <circle cx="370" cy="235" r="42" fill="#111" stroke="#333" stroke-width="4" stroke-dasharray="6,4"/>
          <circle cx="370" cy="235" r="22" fill="#444" stroke="#222" stroke-width="2"/>
          <circle cx="370" cy="235" r="5" fill="#111"/>
          
          <!-- Suspension 3.5" Lift components -->
          <line x1="120" y1="180" x2="120" y2="200" stroke="#facc15" stroke-width="4" stroke-dasharray="2,2"/>
          <line x1="370" y1="180" x2="370" y2="200" stroke="#facc15" stroke-width="4" stroke-dasharray="2,2"/>

          <!-- UNDER THE HOOD / CHASSIS LABELS -->
          <!-- Battery Box (if EV swapped) -->
          <rect x="170" y="180" width="150" height="20" rx="4" fill="#0d2e50" stroke="#00c9ff" stroke-width="1.5"/>
          <text x="245" y="193" fill="#00c9ff" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">EV BATTERY PACK</text>
          
          <!-- Front Motor -->
          <rect x="330" y="145" width="50" height="40" rx="4" fill="#0d2040" stroke="#4ade80" stroke-width="1.5"/>
          <text x="355" y="163" fill="#4ade80" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">EV MOTOR</text>
          <text x="355" y="176" fill="#2a7a4a" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">Drivetrain</text>
          
          <!-- Pointers and Callouts -->
          <!-- Suspension -->
          <polyline points="280,45 280,60 300,75" fill="none" stroke="#facc15" stroke-width="1"/>
          <text x="280" y="40" fill="#facc15" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">3.5" SUSPENSION LIFT</text>

          <!-- Tires -->
          <polyline points="420,250 435,250 435,235" fill="none" stroke="#7a9bbf" stroke-width="1"/>
          <text x="450" y="254" fill="#7a9bbf" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">37" TIRES</text>

          <!-- Winch -->
          <polyline points="435,190 450,190 460,180" fill="none" stroke="#7a9bbf" stroke-width="1"/>
          <text x="475" y="178" fill="#7a9bbf" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">RECOVERY WINCH</text>
          
          <text x="260" y="305" fill="#3a5a7a" font-family="'Space Grotesk',sans-serif" font-size="10" text-anchor="middle" letter-spacing="2">FIRECRACKER RED JEEP 4x4 — BUILD SCHEMATIC</text>
        </svg>