<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 520 320" width="100%" xmlns="http://www.w3.org/2000/svg">
          <!-- Ground -->
          <line x1="20" y1="268" x2="500" y2="268" stroke="#1e3a5a" stroke-width="2"/>

          <!-- Car body -->
          <path d="M60,200 L60,160 Q65,120 100,108 L160,88 Q190,70 240,68 Q290,66 340,72 L400,88 Q430,96 445,115 L460,145 L460,200 Z" fill="#0d1e35" stroke="#1e4a7a" stroke-width="1.5"/>

          <!-- Windshield -->
          <path d="M160,90 Q185,72 240,70 L310,70 L345,75 L360,108 L155,108 Z" fill="#0a2040" stroke="#1e3a5a" stroke-width="1" opacity="0.8"/>

          <!-- Rear window -->
          <path d="M360,75 L400,90 Q420,98 435,115 L440,125 L365,108 Z" fill="#0a2040" stroke="#1e3a5a" stroke-width="1" opacity="0.8"/>

          <!-- Door lines -->
          <line x1="230" y1="108" x2="235" y2="200" stroke="#1e3a5a" stroke-width="1"/>
          <line x1="340" y1="90" x2="345" y2="200" stroke="#1e3a5a" stroke-width="1"/>

          <!-- Wheels -->
          <circle cx="140" cy="268" r="34" fill="#0d1e35" stroke="#2a5080" stroke-width="2.5"/>
          <circle cx="140" cy="268" r="20" fill="#0a1828" stroke="#1e3a5a" stroke-width="1.5"/>
          <circle cx="140" cy="268" r="8" fill="#1a3a5a"/>

          <circle cx="380" cy="268" r="34" fill="#0d1e35" stroke="#2a5080" stroke-width="2.5"/>
          <circle cx="380" cy="268" r="20" fill="#0a1828" stroke="#1e3a5a" stroke-width="1.5"/>
          <circle cx="380" cy="268" r="8" fill="#1a3a5a"/>

          <!-- Undercarriage -->
          <rect x="110" y="200" width="300" height="30" rx="4" fill="#0a1828" stroke="#1e3a5a" stroke-width="1"/>

          <!-- BATTERY PACK (under floor) -->
          <rect x="155" y="202" width="210" height="22" rx="4" fill="#0d2e50" stroke="#00c9ff" stroke-width="1.5"/>
          <text x="260" y="217" fill="#00c9ff" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle">LITHIUM-ION BATTERY PACK 72V / 200Ah</text>

          <!-- MOTOR (front) -->
          <rect x="65" y="152" width="70" height="46" rx="6" fill="#0d2040" stroke="#4ade80" stroke-width="1.5"/>
          <text x="100" y="170" fill="#4ade80" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">AC MOTOR</text>
          <text x="100" y="183" fill="#4ade80" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">72V 30kW</text>
          <text x="100" y="193" fill="#2a7a4a" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">3-Phase</text>

          <!-- CONTROLLER -->
          <rect x="145" y="118" width="70" height="38" rx="5" fill="#0d2040" stroke="#a78bfa" stroke-width="1.5"/>
          <text x="180" y="133" fill="#a78bfa" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">MOTOR</text>
          <text x="180" y="145" fill="#a78bfa" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">CTRL</text>

          <!-- BMS -->
          <rect x="225" y="118" width="60" height="38" rx="5" fill="#0d2040" stroke="#f59e0b" stroke-width="1.5"/>
          <text x="255" y="133" fill="#f59e0b" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">BMS</text>
          <text x="255" y="145" fill="#c47a05" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">Smart</text>

          <!-- DC-DC CONVERTER -->
          <rect x="295" y="118" width="64" height="38" rx="5" fill="#0d2040" stroke="#2dd4bf" stroke-width="1.5"/>
          <text x="327" y="133" fill="#2dd4bf" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">DC-DC</text>
          <text x="327" y="145" fill="#2dd4bf" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">72V→12V</text>

          <!-- CHARGER / OBC -->
          <rect x="370" y="118" width="72" height="38" rx="5" fill="#0d2040" stroke="#00c9ff" stroke-width="1.5"/>
          <text x="406" y="133" fill="#00c9ff" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">OBC</text>
          <text x="406" y="145" fill="#0094cc" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">3.3kW</text>

          <!-- DIESEL GENERATOR (boot) -->
          <rect x="400" y="152" width="56" height="46" rx="6" fill="#2a1505" stroke="#f59e0b" stroke-width="1.5"/>
          <text x="428" y="170" fill="#f59e0b" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">DIESEL</text>
          <text x="428" y="182" fill="#f59e0b" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">GEN</text>
          <text x="428" y="192" fill="#c47a05" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">3–5kVA</text>

          <!-- FUEL TANK indicator -->
          <rect x="310" y="205" width="60" height="18" rx="3" fill="#1a2505" stroke="#84cc16" stroke-width="1"/>
          <text x="340" y="218" fill="#84cc16" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">FUEL TANK</text>

          <!-- Charge port -->
          <rect x="56" y="162" width="10" height="16" rx="2" fill="#00c9ff" opacity="0.8"/>
          <text x="30" y="172" fill="#00c9ff" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">CHG</text>
          <text x="30" y="182" fill="#00c9ff" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">PORT</text>

          <!-- Connection lines -->
          <!-- Motor ↔ Controller -->
          <line x1="135" y1="175" x2="145" y2="150" stroke="#4ade80" stroke-width="1" stroke-dasharray="3 2" opacity="0.6"/>
          <!-- BMS ↔ Battery -->
          <line x1="255" y1="156" x2="255" y2="202" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3 2" opacity="0.6"/>
          <!-- OBC ↔ Battery -->
          <line x1="400" y1="156" x2="340" y2="205" stroke="#00c9ff" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
          <!-- Generator ↔ OBC -->
          <line x1="400" y1="175" x2="442" y2="156" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3 2" opacity="0.6"/>
          <!-- DC-DC ↔ Battery -->
          <line x1="327" y1="156" x2="310" y2="205" stroke="#2dd4bf" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>

          <!-- Regen braking annotation -->
          <text x="108" y="258" fill="#2dd4bf" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">REGEN</text>

          <!-- Title -->
          <text x="260" y="294" fill="#3a5a7a" font-family="'Space Grotesk',sans-serif" font-size="10" text-anchor="middle" letter-spacing="2">MAHINDRA VERITO 2011 — EV CONVERSION LAYOUT</text>
        </svg>