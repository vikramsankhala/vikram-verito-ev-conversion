# Render Blueprint — Mahindra Verito EV Conversion Website + AI Guide
# Node.js serves static site + Anthropic AI chat API
services:
  - type: web
    name: verito-ev-blueprint
    runtime: node
    buildCommand: npm install --prefix api
    startCommand: node api/server.js
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: sameorigin
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
