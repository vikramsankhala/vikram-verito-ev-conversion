<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 200" width="100%" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="ca" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="#00c9ff" stroke-width="1.5"/>
          </marker>
        </defs>

        <!-- Grid -->
        <rect x="10" y="60" width="110" height="50" rx="6" fill="#0d1e08" stroke="#84cc16" stroke-width="1.5"/>
        <text x="65" y="82" fill="#84cc16" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle">🔌 AC GRID</text>
        <text x="65" y="97" fill="#4a7a20" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">230V / 16A</text>

        <!-- Generator -->
        <rect x="10" y="130" width="110" height="50" rx="6" fill="#2a1505" stroke="#f59e0b" stroke-width="1.5"/>
        <text x="65" y="152" fill="#f59e0b" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle">⛽ DIESEL GEN</text>
        <text x="65" y="167" fill="#c47a05" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">230V / 5kVA</text>

        <!-- Fuel tank -->
        <rect x="10" y="10" width="80" height="36" rx="6" fill="#1a2505" stroke="#84cc16" stroke-width="1" opacity="0.6"/>
        <text x="50" y="28" fill="#84cc16" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">FUEL TANK</text>
        <text x="50" y="40" fill="#4a7a20" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">50L Diesel</text>

        <!-- Fuel line -->
        <path d="M70 46 L70 130" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 3" fill="none" opacity="0.5"/>

        <!-- Changeover -->
        <rect x="180" y="80" width="100" height="60" rx="6" fill="#0d1830" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="230" y="103" fill="#a78bfa" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">CHANGEOVER</text>
        <text x="230" y="116" fill="#a78bfa" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">SWITCH</text>
        <text x="230" y="129" fill="#6a5ab0" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">Manual SPDT</text>

        <!-- Grid → Changeover -->
        <path d="M120 85 L178 105" stroke="#84cc16" stroke-width="1.5" fill="none" marker-end="url(#ca)"/>
        <!-- Gen → Changeover -->
        <path d="M120 155 L178 120" stroke="#84cc16" stroke-width="1.5" fill="none" marker-end="url(#ca)"/>

        <!-- OBC -->
        <rect x="340" y="80" width="110" height="60" rx="6" fill="#051525" stroke="#00c9ff" stroke-width="1.5"/>
        <text x="395" y="103" fill="#00c9ff" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle">OBC / CHARGER</text>
        <text x="395" y="117" fill="#0080b0" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">3.3kW 230→72V</text>
        <text x="395" y="130" fill="#0080b0" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">AC in → DC out</text>

        <!-- Changeover → OBC -->
        <path d="M280 110 L338 110" stroke="#84cc16" stroke-width="1.5" fill="none" marker-end="url(#ca)"/>
        <text x="309" y="104" fill="#84cc16" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">230V AC</text>

        <!-- BMS -->
        <rect x="510" y="80" width="90" height="60" rx="6" fill="#1a1000" stroke="#f59e0b" stroke-width="1.5"/>
        <text x="555" y="105" fill="#f59e0b" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle">SMART BMS</text>
        <text x="555" y="118" fill="#c47a05" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">Monitors all cells</text>
        <text x="555" y="130" fill="#c47a05" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">Balances + protects</text>

        <!-- OBC → BMS -->
        <path d="M450 110 L508 110" stroke="#00c9ff" stroke-width="1.5" fill="none" marker-end="url(#ca)"/>
        <text x="479" y="104" fill="#00c9ff" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">72V DC</text>

        <!-- Battery Pack -->
        <rect x="660" y="70" width="130" height="80" rx="8" fill="#051525" stroke="#00c9ff" stroke-width="2"/>
        <text x="725" y="97" fill="#00c9ff" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle">BATTERY PACK</text>
        <text x="725" y="112" fill="#0080b0" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">72V / 200Ah</text>
        <text x="725" y="126" fill="#0080b0" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">14.4 kWh LiFePO4</text>
        <text x="725" y="138" fill="#004060" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">SOC: 20–90% safe</text>

        <!-- BMS → Battery -->
        <path d="M600 110 L658 110" stroke="#f59e0b" stroke-width="1.5" fill="none" marker-end="url(#ca)"/>
        <text x="629" y="104" fill="#f59e0b" font-family="'JetBrains Mono',monospace" font-size="7" text-anchor="middle">Protected DC</text>

        <!-- Bottom label -->
        <text x="400" y="192" fill="#3a5a7a" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle">DUAL CHARGING PATH — GRID / DIESEL GENERATOR (STATIONARY MODE ONLY)</text>
      </svg>